name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_WORKLOAD_IDENTITY_POOL: ${{ vars.GCP_WORKLOAD_IDENTITY_POOL }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
  GCP_SERVICE_NAME: ${{ vars.GCP_SERVICE_NAME }}
  GCP_REPO: ${{ vars.GCP_REPO }}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:

    - name: Check configuration
      run: |
        if [ -z "${{ vars.GCP_PROJECT_ID }}" ] || \
           [ -z "${{ vars.GCP_PROJECT_NUMBER }}" ] || \
           [ -z "${{ vars.GCP_REGION }}" ] || \
           [ -z "${{ vars.GCP_WORKLOAD_IDENTITY_POOL }}" ] || \
           [ -z "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] || \
           [ -z "${{ vars.GCP_SERVICE_ACCOUNT }}" ] || \
           [ -z "${{ vars.GCP_SERVICE_NAME }}" ] || \
           [ -z "${{ vars.GCP_REPO }}" ]; then
          echo "This is a template repository. Configure the required GitHub Actions variables before running CI."
          exit 1
        fi

    - name: Checkout
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.GCP_WORKLOAD_IDENTITY_POOL }}/providers/${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ env.GCP_SERVICE_ACCOUNT }}'
        audience: 'sts.googleapis.com'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push container image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO }}/${{ env.GCP_SERVICE_NAME }}:${{ github.sha }}
          ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO }}/${{ env.GCP_SERVICE_NAME }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Update Cloud Run service
      run: |-
        if ! gcloud run services describe "$GCP_SERVICE_NAME" \
          --region "$GCP_REGION" \
          --project "$GCP_PROJECT_ID" >/dev/null 2>&1; then
          echo "Cloud Run service ${GCP_SERVICE_NAME} does not exist. Run tofu apply after the bootstrap image is available."
          exit 1
        fi

        gcloud run services update "$GCP_SERVICE_NAME" \
          --image "${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPO }}/${{ env.GCP_SERVICE_NAME }}:${{ github.sha }}" \
          --region "$GCP_REGION" \
          --project "$GCP_PROJECT_ID"

    - name: Show service URL
      run: |
        gcloud run services describe "$GCP_SERVICE_NAME" \
          --region "$GCP_REGION" \
          --project "$GCP_PROJECT_ID" \
          --format='value(status.url)'
